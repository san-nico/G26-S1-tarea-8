<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interfaz de la API de Rick y Morty mostrando personajes con paginación y detalles visuales.">
    <meta name="keywords" content="Rick and Morty, API, personajes, paginación, JavaScript, HTML, CSS">
    <title>Tarea 8: Rick & Morty API</title>
    <link rel="stylesheet" href="static/css/style.css">
    <script type="text/javascript" src="static/js/api.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!--favicon-->
    <link rel="icon" type="image/x-icon" href="static/img/favicon.png">


    <script type="text/template" id="row-template">
        <div class="card__fila--{{eje}}">
        <img class="card__icono" src="static/img/{{campo}}.png">
        <h3 class="card__campo">{{label}}</h3>
        <p class="card__valor {{modificador}}" >{{valor}}</p>
        </div>
    </script>

    <!-- Template -->
    <script type="text/template" id="character-template">
        <article class="card">

        <div class="card__retrato">
            <img class="card__imagen imagen--{{status}}" src="{{image}}">
            <div class="card__glass"></div>
            <img class="card__canvas retrato--{{gender}}" src="static/img/canvas-{{status}}.png">
        </div>

        <div class="card__filas">
            <div class="card__fila">
                {{row-name}}
                {{row-gender}}
            </div>
            
            <div class="card__fila">
                {{row-status}}
                {{row-origin}}
            </div>
            
            <div class="card__fila">
                {{row-species}}
                {{row-location}}
            </div>
        </div>

        </article>
  </script>
</head>

<body>
    <div class="ui-holder">
        <nav class="ui" id="#ui">
            <label for="btn-input">Página</label>
            <button title="izquierda" id="btn-izquierda" class="ui__boton ui--control">
                <i class="fa-solid fa-caret-left"></i>
            </button>
            <input disabled id="btn-input" class="ui__input ui--control" type="text" value="1">
            <button title="derecha" id="btn-derecha" class="ui__boton ui--control">
                <i class="fa-solid fa-caret-right"></i>
            </button>
            <br>
        </nav>
    </div>

    <section class="card-holder" id="mainholder">
    </section>
</body>

</html>
